name: Linters

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linters:
    name: Run Linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.12'

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
